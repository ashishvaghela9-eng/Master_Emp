components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/SystemUser"
      required:
        - token
        - user

    SystemUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - role
        - createdAt

    CreateSystemUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
      required:
        - name
        - email
        - password
        - role

    UpdateSystemUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string

    EmployeeAccess:
      type: object
      properties:
        zohoEmail:
          type: boolean
        microsoftEmail:
          type: boolean
        microsoftOffice:
          type: boolean
        finfluxBmDashboard:
          type: boolean
        mobiliteField:
          type: boolean
        mobiliteCredit:
          type: boolean
        hoDashboard:
          type: boolean
        lightMoney:
          type: boolean
        zohoProjects:
          type: boolean
        jira:
          type: boolean
        bitbucket:
          type: boolean
        adobeAcrobat:
          type: boolean
        assetcuez:
          type: boolean
        exotel:
          type: boolean
        godaddy:
          type: boolean
        bluehost:
          type: boolean
        hostinger:
          type: boolean
        emailHosting:
          type: boolean
        awsConsole:
          type: boolean
        msg91:
          type: boolean
        dmsAlfresco:
          type: boolean

    Employee:
      type: object
      properties:
        id:
          type: integer
        serialNumber:
          type: integer
        employeeCode:
          type: string
        name:
          type: string
        status:
          type: string
        department:
          type: string
        designation:
          type: string
        contactNumber:
          type: string
        state:
          type: string
        branch:
          type: string
        joiningDate:
          type: string
        email:
          type: string
        requester:
          type: string
        approver:
          type: string
        creator:
          type: string
        exitInitiator:
          type: string
        exitDate:
          type: string
        userExitStatus:
          type: string
        access:
          $ref: "#/components/schemas/EmployeeAccess"
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - employeeCode
        - name
        - status
        - createdAt
        - updatedAt

    CreateEmployeeRequest:
      type: object
      properties:
        employeeCode:
          type: string
        name:
          type: string
        status:
          type: string
        department:
          type: string
        designation:
          type: string
        contactNumber:
          type: string
        state:
          type: string
        branch:
          type: string
        joiningDate:
          type: string
        email:
          type: string
        requester:
          type: string
        approver:
          type: string
        creator:
          type: string
        exitInitiator:
          type: string
        exitDate:
          type: string
        userExitStatus:
          type: string
      required:
        - employeeCode
        - name
        - status

    UpdateEmployeeRequest:
      type: object
      properties:
        employeeCode:
          type: string
        name:
          type: string
        status:
          type: string
        department:
          type: string
        designation:
          type: string
        contactNumber:
          type: string
        state:
          type: string
        branch:
          type: string
        joiningDate:
