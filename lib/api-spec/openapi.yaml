openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Employee Master API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: employees
    description: Employee management
  - name: branch-file-station
    description: Branch File Station module
  - name: assetcuez
    description: AssetCuez module
  - name: vpn
    description: VPN module
  - name: jira
    description: Jira module
  - name: mailvault
    description: MailVault module
  - name: ftp
    description: FTP module
  - name: acronis
    description: Acronis Backup module
  - name: tata-tele
    description: Tata Tele module
  - name: system-users
    description: System Users module
  - name: reports
    description: Reports module
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

